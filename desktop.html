<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    
    <link rel="stylesheet" href="desktop.css">

    <style>
        /* Ajuste do Header para manter o título no lugar e alinhar botões */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px; 
            height: 60px;
            background-color: #006d38;
            color: white;
            position: relative;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            position: static !important; /* Garante que não use o estilo antigo do CSS */
            transform: none !important;
        }

        /* Botão Amarelo Retangular (Estilo que você aprovou) */
        .btn-header-novo {
            background-color: #fbc02d; 
            color: #333 !important;
            border: none;
            padding: 8px 20px;
            border-radius: 4px; 
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            height: auto;
            line-height: normal;
        }

        .btn-header-novo:hover {
            background-color: #fdd835;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-titulo">RESIDENCIAIS MRV EM SÃO PAULO - mai/26</div>
        
        <div class="header-buttons">
            <button id="btn-documentos" class="btn-header-novo">Documentos</button>
            <button id="btn-sobre" class="btn-header-novo">Sobre</button>
        </div>
    </div>

    <div class="wrapper">
        <aside class="sidebar-esq" id="lista-imoveis">
            <div style="padding:20px; color:#666; font-size: 0.8rem;">Carregando residenciais...</div>
        </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Selecione uma região no mapa</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Clique em algum Residencial ou em alguma região verde do mapa</p>
            </div>
        </aside>
    </div>

    <script src="mapa-SP.js"></script>
    <script src="desktop.js"></script>
</body>
</html>
