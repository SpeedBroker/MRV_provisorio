<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <link rel="stylesheet" href="desktop.css">

    <style>
        /* Ajuste do Header para blindar o layout */
        .header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 0 40px !important; 
            height: 60px !important;
            background-color: #006d38 !important;
            color: white !important;
            position: relative !important;
            box-sizing: border-box !important;
        }

        .header-titulo {
            font-weight: bold !important;
            font-size: 1.2rem !important;
        }

        /* Container dos botões que impede a sobreposição */
        .header-buttons {
            display: flex !important;
            gap: 12px !important;
            position: relative !important; /* Força a saída do absolute do CSS antigo */
            right: auto !important;
            top: auto !important;
            transform: none !important;
            align-items: center !important;
        }

        /* Estilo unificado para os dois botões (Amarelo e Retangular) */
        .btn-header-novo {
            background-color: #fbc02d !important; /* Amarelo MRV */
            color: #333 !important;
            border: none !important;
            padding: 8px 18px !important;
            border-radius: 4px !important; /* Bordas suaves */
            font-size: 0.8rem !important;
            font-weight: bold !important;
            cursor: pointer !important;
            text-transform: uppercase !important;
            transition: background 0.2s !important;
            white-space: nowrap !important; /* Impede que o texto quebre */
            display: inline-block !important;
            line-height: normal !important;
            height: auto !important;
            width: auto !important;
        }

        .btn-header-novo:hover {
            background-color: #fdd835 !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-titulo">RESIDENCIAIS MRV EM SÃO PAULO - mai/26</div>
        
        <div class="header-buttons">
            <button id="btn-documentos" class="btn-header-novo">Documentos</button>
            <button id="btn-sobre" class="btn-header-novo">Sobre</button>
        </div>
    </div>

    <div class="wrapper">
        <aside class="sidebar-esq" id="lista-imoveis">
            <div style="padding:20px; color:#666; font-size: 0.8rem;">Carregando residenciais...</div>
        </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Selecione uma região no mapa</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Clique em algum Residencial ou em alguma região verde do mapa</p>
            </div>
        </aside>
    </div>

    <script src="mapa-SP.js"></script>
    <script src="desktop.js"></script>
</body>
</html>
